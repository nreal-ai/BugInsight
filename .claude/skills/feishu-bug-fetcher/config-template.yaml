'# 飞书缺陷分析工具 - 统一配置文件': ''
'# 使用说明: 复制此文件到每个 skill 目录的 config.yaml，填入实际值': ''
feishu:
  project_key: <飞书项目 Key>
  plugin_id: <飞书插件 ID>
  plugin_secret: <飞书插件密钥>
  user_key: <飞书用户 Key>
openviking:
  api_base: http://127.0.0.1:1934
  api_key: <OpenViking API 密钥>
  account: default
  user: admin
  config_path: ~/.openviking/ov.conf
  home: ~/.openviking
llm:
  api_base: <LLM API 地址>
  api_key: <LLM API 密钥>
  model: qwen3-coder-plus
paths:
  skill_dir: ~/.hermes/skills/bug-analysis
  feishu_output_dir: ~/.openviking/workspace/feishu-bugs
  hermes_logs: ~/.hermes/logs
  mcporter_credentials: ~/.mcporter/credentials.json
  nreal_code_dir: references/nreal-code
concurrency:
  max_workers: 5
  ov_vlm_max_concurrent: 1
  ov_embedding_max_concurrent: 1
